name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/mlops.yml'
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: vin-mlops-lab-757312350
  GCP_PROJECT_NUMBER: "141571983280"
  GCP_ZONE: us-central1-a
  GCE_INSTANCE: mlops-serve
  CLOUD_BUCKET: vin-mlops-lab-757312350-bucket
  GCP_SERVICE_ACCOUNT: mlops-lab-sa@vin-mlops-lab-757312350.iam.gserviceaccount.com
  WIF_PROVIDER: projects/141571983280/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Configure remote MLflow tracking
        run: |
          if [ -n "${{ secrets.MLFLOW_TRACKING_URI }}" ]; then
            echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
            echo "Using remote MLflow tracking server."
          else
            echo "MLFLOW_TRACKING_URI=sqlite:///mlflow.db" >> $GITHUB_ENV
            echo "Using local SQLite MLflow tracking."
          fi
          if [ -n "${{ secrets.MLFLOW_TRACKING_USERNAME }}" ]; then
            echo "MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.MLFLOW_TRACKING_PASSWORD }}" ]; then
            echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Save model and reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-outputs
          path: |
            models/model.pkl
            outputs/metrics.json
            outputs/report.txt


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install cloud dependency
        run: pip install google-cloud-storage==2.16.0

      - name: Download model outputs
        uses: actions/download-artifact@v4
        with:
          name: model-outputs

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Check eval gate and rollback guard
        run: |
          python - <<'EOF'
          import json
          import os
          from google.cloud import storage

          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.70. Huy deploy.")

          bucket_name = os.environ["CLOUD_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          previous_blob = bucket.blob("outputs/latest/metrics.json")

          if previous_blob.exists():
              previous = json.loads(previous_blob.download_as_text())
              previous_acc = float(previous["accuracy"])
              print(f"Previous deployed accuracy: {previous_acc:.4f}")
              if acc < previous_acc:
                  raise SystemExit(
                      f"FAILED: accuracy {acc:.4f} < previous {previous_acc:.4f}. Huy deploy."
                  )
          else:
              print("No previous deployed metrics found. This will be the first deployment.")

          bucket.blob("models/latest/model.pkl").upload_from_filename("models/model.pkl")
          bucket.blob("outputs/latest/metrics.json").upload_from_filename("outputs/metrics.json")
          bucket.blob("outputs/latest/report.txt").upload_from_filename("outputs/report.txt")
          print(f"PASSED: promoted model to gs://{bucket_name}/models/latest/model.pkl")
          EOF
        env:
          CLOUD_BUCKET: ${{ env.CLOUD_BUCKET }}


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Restart service on VM
        run: |
          gcloud compute ssh "${GCE_INSTANCE}" \
            --zone "${GCP_ZONE}" \
            --project "${GCP_PROJECT_ID}" \
            --quiet \
            --command "sudo systemctl restart mlops-serve && for i in 1 2 3 4 5 6; do if curl -sf http://localhost:8000/health; then break; fi; sleep 5; done; curl -sf http://localhost:8000/health; echo 'Health check passed.'"
